name: golfearn_pro
description: Golf Lesson Pro CRM Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # Supabase - 백엔드 연동
  supabase_flutter: ^2.3.0
  
  # 상태관리
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  
  # 라우팅
  go_router: ^17.1.0
  
  # UI/UX
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  
  # 캘린더
  table_calendar: ^3.0.9
  
  # 로컬 저장소
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  
  # 미디어
  image_picker: ^1.0.7
  video_player: ^2.8.3
  file_picker: ^10.3.10
  
  # 차트/그래프
  fl_chart: ^1.1.1
  
  # 폼/입력
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  
  # 결제
  in_app_purchase: ^3.1.13
  
  # HTTP
  dio: ^5.4.0
  http: ^1.2.0
  
  # 유틸리티
  intl: ^0.20.2
  url_launcher: ^6.2.4
  flutter_dotenv: ^6.0.0
  uuid: ^4.3.3
  collection: ^1.18.0
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  
  # 알림
  flutter_local_notifications: ^21.0.0
  
  # 권한
  permission_handler: ^12.0.1
  
  # 애니메이션
  lottie: ^3.0.0
  
  # 카메라
  camera: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  
  # 아이콘/스플래시
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
    
  # fonts:
    # - family: Pretendard
    #   fonts:
    #     - asset: assets/fonts/Pretendard-Regular.ttf
    #       weight: 400
          
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  
flutter_native_splash:
  color: "#10B981"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: true